version: "3.9"
services:
  vulnerable:
    build:
      context: ./apps/vulnerable
    environment:
      - FLASK_ENV=development
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - vuln-data:/data
  secure:
    build:
      context: ./apps/secure
    environment:
      - FLASK_ENV=development
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
    ports:
      - "127.0.0.1:5002:5000"
    volumes:
      - secure-data:/data
volumes:
  vuln-data:
  secure-data:

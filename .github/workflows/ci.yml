name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app_dir: [apps/vulnerable, apps/secure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ${{ matrix.app_dir }}/requirements.txt

      - name: Compile check
        run: python -m py_compile ${{ matrix.app_dir }}/app.py ${{ matrix.app_dir }}/db.py

  smoke:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install secure dependencies
        run: pip install -r apps/secure/requirements.txt

      - name: Run smoke tests
        run: python scripts/smoke_test.py

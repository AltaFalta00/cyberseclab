<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Secure Login</title>
</head>
<body>
  <h1>Login (Secure)</h1>
  <form method="POST" action="/login">
    <label>Username</label>
    <input name="username" />
    <label>Password</label>
    <input name="password" type="password" />
    <button type="submit">Login</button>
  </form>
</body>
</html>
